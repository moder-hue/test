<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shams Jewellery Payment</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-emerald-100 via-green-50 to-white flex items-center justify-center p-6">

  <div class="w-full max-w-md bg-white/85 backdrop-blur-2xl border border-emerald-100 rounded-[32px] shadow-2xl p-8 text-center">
    <div class="flex flex-col items-center gap-4">
      <div class="w-full max-w-[240px] h-[110px] rounded-[28px] bg-white flex items-center justify-center shadow-lg overflow-hidden border border-emerald-100 p-4">
        <img
          src="https://raw.githubusercontent.com/moder-hue/shams/refs/heads/main/326585456_476805731329113_4946294825581284066_n.png"
          alt="Shop Logo"
          class="max-w-full max-h-full object-contain"
        />
      </div>

      <div>
        <h1 class="text-3xl font-bold tracking-tight text-black">
          Shams Jewellery
        </h1>
        <p class="text-black/70 mt-2 text-sm">
          Pay quickly and securely using InstaPay.
        </p>
      </div>
    </div>

    <div class="mt-8 bg-gradient-to-br from-emerald-50 to-green-50 border border-emerald-100 rounded-3xl p-5 shadow-inner">
      <p class="text-sm text-black/70 mb-2">Bank Account Number</p>
      <p id="accountNumber" class="text-xl font-mono tracking-wider break-all text-black">
        1013150210030201
      </p>
    </div>

    <button
      onclick="copyAccountNumber()"
      class="mt-6 w-full bg-black hover:bg-neutral-900 transition-all duration-300 text-white font-semibold py-4 rounded-3xl shadow-lg hover:scale-[1.02] active:scale-[0.98] border border-emerald-200"
    >
      Copy Account Number
    </button>

    <a
      href="https://wa.me/message/NXK26NSZOLFIF1"
      target="_blank"
      class="mt-4 w-full bg-green-500 hover:bg-green-600 transition-all duration-300 text-white font-semibold py-4 rounded-3xl shadow-lg hover:scale-[1.02] active:scale-[0.98] flex items-center justify-center gap-3"
    >
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" class="w-6 h-6 fill-white">
        <path d="M16 .396C7.164.396 0 7.56 0 16.396c0 2.82.736 5.575 2.134 8.007L0 32l7.828-2.053a15.93 15.93 0 0 0 8.172 2.24h.006C24.84 32.187 32 25.023 32 16.187 32 7.35 24.836.396 16 .396zm0 29.02a13.24 13.24 0 0 1-6.742-1.848l-.482-.287-4.646 1.218 1.24-4.53-.314-.465a13.18 13.18 0 0 1-2.026-7.108C3.03 9.11 8.714 3.426 16 3.426c7.287 0 12.97 5.684 12.97 12.97 0 7.287-5.683 12.97-12.97 12.97zm7.11-9.72c-.39-.196-2.31-1.14-2.668-1.27-.358-.13-.618-.195-.878.196-.26.39-1.008 1.27-1.236 1.53-.228.26-.455.293-.845.098-.39-.195-1.647-.607-3.137-1.936-1.16-1.035-1.943-2.31-2.17-2.7-.228-.39-.024-.6.17-.795.176-.175.39-.455.586-.683.195-.228.26-.39.39-.65.13-.26.065-.488-.032-.683-.097-.195-.878-2.114-1.203-2.894-.317-.762-.64-.658-.878-.67l-.748-.013c-.26 0-.683.098-1.04.488-.358.39-1.365 1.334-1.365 3.252 0 1.918 1.397 3.77 1.592 4.03.195.26 2.75 4.2 6.66 5.89.93.402 1.656.642 2.223.822.934.297 1.784.255 2.456.155.75-.112 2.31-.943 2.636-1.854.325-.91.325-1.69.227-1.853-.097-.163-.357-.26-.747-.455z"/>
      </svg>
      Send a Screenshot
    </a>

    <p class="mt-6 text-xs text-black/60 leading-relaxed">
      After copying the account number, open InstaPay and complete your transfer.
	  <br>Kindly send us a screenshot afterwards.</br>
    </p>
  </div>

  <script>
    function copyAccountNumber() {
      const accountNumber = document.getElementById('accountNumber').innerText;
      navigator.clipboard.writeText(accountNumber)
        .then(() => {
          alert('Bank account number copied successfully!');
        })
        .catch(() => {
          alert('Failed to copy the account number.');
        });
    }
  </script>

</body>
</html>
